    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        :root {
            --primary-color: #ff00ff; --secondary-color: #00ffff; --bg-color: #000033;
            --text-color: #ffffff; --correct-color: #00ff00; --wrong-color: #ff0000;
            --pixel-font: 'Press Start 2P', cursive;
        }
        body {
            margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color);
            font-family: var(--pixel-font); display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow-x: hidden; image-rendering: pixelated;
        }
        .game-container {
            width: 90%; max-width: 600px; background: #000; border: 4px solid var(--primary-color);
            padding: 20px; box-shadow: 10px 10px 0px var(--secondary-color); text-align: center;
        }
        h1 { font-size: 1.5rem; color: var(--primary-color); margin-bottom: 20px; text-shadow: 2px 2px 0 #000; }
        h2 { font-size: 0.9rem; margin-bottom: 15px; min-height: 60px; display: flex; align-items: center; justify-content: center; }
        p { font-size: 0.7rem; line-height: 1.5; }
        .pixel-button {
            display: block; width: 100%; padding: 15px; margin: 10px 0; background: #222;
            border: 4px solid #444; color: #fff; font-family: var(--pixel-font); font-size: 0.7rem;
            cursor: pointer; transition: all 0.1s; text-transform: uppercase;
        }
        .pixel-button:hover:not(:disabled) { background: #444; border-color: var(--secondary-color); transform: scale(1.02); }
        .pixel-button:active:not(:disabled) { transform: scale(0.98); }
        .pixel-button.primary { border-color: var(--primary-color); }
        .pixel-button:disabled { opacity: 0.3; cursor: not-allowed; }
        .hud { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 0.5rem; border-bottom: 2px dashed #444; padding-bottom: 10px; }
        .heart { color: var(--wrong-color); }
        .score { color: var(--secondary-color); }
        .combo { color: var(--correct-color); }
        .timer-container { width: 100%; height: 10px; background: #222; border: 2px solid #444; margin-bottom: 20px; position: relative; }
        .timer-bar { height: 100%; background: var(--primary-color); transition: width 1s linear; }
        .category-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .item-container { display: flex; gap: 10px; margin-top: 20px; justify-content: center; }
        .item-button { padding: 10px; font-size: 0.4rem; flex: 1; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .blinking { animation: blink 1s infinite; }
        @media (max-width: 480px) {
            .game-container { width: 95%; padding: 15px; border-width: 2px; }
            h1 { font-size: 1.1rem; } h2 { font-size: 0.7rem; }
            .pixel-button { padding: 12px; font-size: 0.5rem; }
            .category-grid { grid-template-columns: 1fr; }
        }
        table { width: 100%; font-size: 0.5rem; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 8px; border-bottom: 1px solid #222; text-align: center; }
        th { border-bottom: 2px solid var(--primary-color); }
    </style>
</head>

            { "id": 46, "category": "anime", "question_text": "서기 2112년에서 온 고양이 로봇으로, 4차원 주머니에서 신비한 도구들을 꺼내 진구를 도와주는 캐릭터는?", "options": ["도라에몽", "피카츄", "아톰", "코난"], "correct_answer_index": 0, "explanation": "도라에몽의 주인공 도라에몽입니다." },
            { "id": 47, "category": "anime", "question_text": "검은 조직의 약을 먹고 몸이 어린아이로 변해버린 고등학생 명탐정으로, '범인은 이 안에 있어!'라는 대사로 유명한 인물은?", "options": ["유명한", "김전일", "코난", "괴도 키드"], "correct_answer_index": 2, "explanation": "명탐정 코난의 주인공 코난(남도일)입니다." },
            { "id": 48, "category": "anime", "question_text": "거대 거인들이 지배하는 세상에서 인류를 지키기 위해 조사병단에 입단한 소년으로, 거인으로 변신할 수 있는 능력을 가진 인물은?", "options": ["리바이", "미카사", "아르민", "에렌 예거"], "correct_answer_index": 3, "explanation": "진격의 거인의 주인공 에렌 예거입니다." },
            { "id": 50, "category": "anime", "question_text": "지브리 스튜디오의 작품으로, 숲의 주인이며 거대한 몸집과 큰 입, 우산을 들고 다니는 모습으로 유명한 정령은?", "options": ["가오나시", "하울", "토토로", "포뇨"], "correct_answer_index": 2, "explanation": "이웃집 토토로의 주인공 토토로입니다." }
        ];
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const SCREEN = { MAIN: 'MAIN', CATEGORY: 'CATEGORY', QUIZ: 'QUIZ', RESULT: 'RESULT', RANKING: 'RANKING' };

        function App() {
            const [screen, setScreen] = useState(SCREEN.MAIN);
            const [selectedCategory, setSelectedCategory] = useState(null);
            const [currentQuestions, setCurrentQuestions] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [hearts, setHearts] = useState(3);
            const [combo, setCombo] = useState(0);
            const [maxCombo, setMaxCombo] = useState(0);
            const [timeLeft, setTimeLeft] = useState(15);
            const [isActive, setIsActive] = useState(false);
            const [showFeedback, setShowFeedback] = useState(false);
            const [isCorrect, setIsCorrect] = useState(false);
            const [items, setItems] = useState({ half: true, time: true, hint: true });
            const [hiddenOptions, setHiddenOptions] = useState([]);
            const [hintActive, setHintActive] = useState(false);
            const [userName, setUserName] = useState('');
            const [rankings, setRankings] = useState(JSON.parse(localStorage.getItem('quiz_ranking')) || []);

            useEffect(() => {
                let timer = null;
                if (screen === SCREEN.QUIZ && isActive && timeLeft > 0) {
                    timer = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
                } else if (timeLeft === 0 && screen === SCREEN.QUIZ && !showFeedback) {
                    handleAnswer(-1);
                }
                return () => clearInterval(timer);
            }, [screen, isActive, timeLeft, showFeedback]);

            const shuffle = (array) => [...array].sort(() => Math.random() - 0.5);

            const selectCategory = (cat) => {
                let filtered = cat === 'random' 
                    ? shuffle(QUESTIONS_DATA).slice(0, 10)
                    : shuffle(QUESTIONS_DATA.filter(q => q.category === cat)).slice(0, 10);
                
                // Shuffle options for each question and update correct_answer_index
                const shuffledQuestions = filtered.map(q => {
                    const originalCorrectText = q.options[q.correct_answer_index];
                    const shuffledOptions = shuffle(q.options);
                    const newCorrectIndex = shuffledOptions.indexOf(originalCorrectText);
                    return { ...q, options: shuffledOptions, correct_answer_index: newCorrectIndex };
                });
                
                setCurrentQuestions(shuffledQuestions);
                setSelectedCategory(cat);
                setCurrentIndex(0); setScore(0); setHearts(3); setCombo(0); setMaxCombo(0);
                setItems({ half: true, time: true, hint: true });
                setScreen(SCREEN.QUIZ);
                startNewQuestion();
            };

            const startNewQuestion = () => { 
                setTimeLeft(15); setIsActive(true); setShowFeedback(false); 
                setHiddenOptions([]); setHintActive(false); 
            };

            const handleAnswer = (index) => {
                setIsActive(false);
                const correct = currentQuestions[currentIndex].correct_answer_index === index;
                setIsCorrect(correct); setShowFeedback(true);
                if (correct) {
                    setScore(prev => prev + 100 + (timeLeft * 10) + (combo * 20));
                    setCombo(prev => { const next = prev + 1; if(next > maxCombo) setMaxCombo(next); return next; });
                } else {
                    setHearts(prev => prev - 1); setCombo(0);
                }
            };

            const useHalf = () => {
                if (!items.half) return;
                const correct = currentQuestions[currentIndex].correct_answer_index;
                const wrongs = [0,1,2,3].filter(i => i !== correct);
                const toHide = shuffle(wrongs).slice(0, 2);
                setHiddenOptions(toHide);
                setItems(p => ({...p, half: false}));
            };

            const useTime = () => { if(items.time) { setTimeLeft(t => t + 10); setItems(p => ({...p, time: false})); } };
            const useHint = () => { if(items.hint) { setHintActive(true); setItems(p => ({...p, hint: false})); } };

            const nextQuestion = () => {
                if ((hearts <= 1 && !isCorrect) || currentIndex >= currentQuestions.length - 1) { setScreen(SCREEN.RESULT); }
                else { setCurrentIndex(prev => prev + 1); startNewQuestion(); }
            };

            const saveRanking = () => {
                const newEntry = { id: Date.now(), user_name: userName || 'PLAYER', score: score, date: new Date().toLocaleDateString() };
                const updated = [...rankings, newEntry].sort((a, b) => b.score - a.score).slice(0, 10);
                setRankings(updated); localStorage.setItem('quiz_ranking', JSON.stringify(updated));
                setScreen(SCREEN.RANKING);
            };

            const renderMain = () => (
                <div className="game-container">
                    <h1 className="blinking">TRIVIA ARCADE</h1>
                    <p>Retro Trivia Challenge</p>
                    <button className="pixel-button primary" onClick={() => setScreen(SCREEN.CATEGORY)}>Start Game</button>
                    <button className="pixel-button" onClick={() => setScreen(SCREEN.RANKING)}>Ranking</button>
                </div>
            );

            const renderCategory = () => (
                <div className="game-container">
                    <h2>Select Category</h2>
                    <div className="category-grid">
                        <button className="pixel-button" onClick={() => selectCategory('history')}>History</button>
                        <button className="pixel-button" onClick={() => selectCategory('science')}>Science</button>
                        <button className="pixel-button" onClick={() => selectCategory('geography')}>Geography</button>
                        <button className="pixel-button" onClick={() => selectCategory('general')}>General</button>
                        <button className="pixel-button" onClick={() => selectCategory('anime')}>Anime</button>
                    </div>
                    <button className="pixel-button primary" style={{marginTop:'20px'}} onClick={() => selectCategory('random')}>Random Mode</button>
                    <button className="pixel-button" onClick={() => setScreen(SCREEN.MAIN)}>Back</button>
                </div>
            );

            const renderQuiz = () => {
                const q = currentQuestions[currentIndex];
                if (!q) return null;
                if (showFeedback) return (
                    <div className="game-container">
                        <h2 style={{color: isCorrect ? 'var(--correct-color)' : 'var(--wrong-color)'}}>{isCorrect ? 'CORRECT!' : 'WRONG!'}</h2>
                        <p>Answer: {q.options[q.correct_answer_index]}</p>
                        <p style={{fontSize:'0.6rem', background:'#222', padding:'10px'}}>{q.explanation}</p>
                        <button className="pixel-button primary" onClick={nextQuestion}>NEXT</button>
                    </div>
                );
                return (
                    <div className="game-container">
                        <div className="hud">
                            <span className="heart">LIFE: {Array(hearts > 0 ? hearts : 0).fill('♥').join('')}</span>
                            <span className="score">PTS: {score}</span>
                            <span className="combo">COMBO: {combo}</span>
                        </div>
                        <div className="timer-container"><div className="timer-bar" style={{width: `${(timeLeft/15)*100}%`}}></div></div>
                        <h2 style={{minHeight:'80px'}}>{q.question_text}</h2>
                        {hintActive && <p style={{color:'var(--secondary-color)', fontSize:'0.5rem', marginBottom:'10px'}}>HINT: Look closely!</p>}
                        {q.options.map((opt, i) => (
                            <button key={i} className="pixel-button" onClick={() => handleAnswer(i)} style={{visibility: hiddenOptions.includes(i) ? 'hidden' : 'visible'}}>{opt}</button>
                        ))}
                        <div className="item-container">
                            <button className="pixel-button item-button" onClick={useHalf} disabled={!items.half}>50:50</button>
                            <button className="pixel-button item-button" onClick={useTime} disabled={!items.time}>+Time</button>
                            <button className="pixel-button item-button" onClick={useHint} disabled={!items.hint}>Hint</button>
                        </div>
                    </div>
                );
            };

            const renderResult = () => (
                <div className="game-container">
                    <h1>{hearts > 0 ? 'MISSION CLEAR' : 'GAME OVER'}</h1>
                    <p className="score">FINAL SCORE: {score}</p>
                    <p style={{fontSize:'0.5rem'}}>MAX COMBO: {maxCombo}</p>
                    <input type="text" className="pixel-button" style={{cursor:'text', textAlign:'center'}} placeholder="YOUR NAME" onChange={e => setUserName(e.target.value)} />
                    <button className="pixel-button primary" onClick={saveRanking}>SAVE RANKING</button>
                    <button className="pixel-button" onClick={() => setScreen(SCREEN.MAIN)}>HOME</button>
                </div>
            );

            const renderRanking = () => (
                <div className="game-container">
                    <h1>TOP 10</h1>
                    <table>
                        <thead><tr><th>NAME</th><th>SCORE</th><th>DATE</th></tr></thead>
                        <tbody>{rankings.map(r => <tr key={r.id}><td>{r.user_name}</td><td>{r.score}</td><td>{r.date}</td></tr>)}</tbody>
                    </table>
                    <button className="pixel-button primary" onClick={() => setScreen(SCREEN.MAIN)}>BACK</button>
                </div>
            );

            return (
                <div>
                    {screen === SCREEN.MAIN && renderMain()}
                    {screen === SCREEN.CATEGORY && renderCategory()}
                    {screen === SCREEN.QUIZ && renderQuiz()}
                    {screen === SCREEN.RESULT && renderResult()}
                    {screen === SCREEN.RANKING && renderRanking()}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
